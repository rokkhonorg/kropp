name: CI

# Build + test on every pushed commit (to any branch; tag pushes are handled by
# the release workflow) and on pull requests, uploading the built binary as a
# workflow artifact for each platform. Also runnable on demand from the Actions
# tab via workflow_dispatch.
on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

# Cancel an in-progress run when the same ref is pushed again.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            bin: kropp.exe
          - os: ubuntu-latest
            bin: kropp
          - os: macos-latest
            bin: kropp
    steps:
      - uses: actions/checkout@v7

      # SAM3 pulls C++ deps (esaxx-rs / onig) that link against clang's
      # compiler-rt; pin a stable Xcode so its clang resource path resolves on
      # the macOS runner.
      - name: Select Xcode (macOS)
        if: runner.os == 'macOS'
        uses: maxim-lobanov/setup-xcode@v1.7.0
        with:
          xcode-version: latest-stable

      # The cc crate emits `-lclang_rt.osx` with a guessed clang resource path
      # that doesn't exist on the runner, and the link uses `-nodefaultlibs` so
      # there's no fallback search. Find the real libclang_rt.osx.a and add its
      # directory to the link search path. Set before rust-cache so it's part of
      # the cache key.
      - name: Provide clang runtime path (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          libdir=""
          for base in \
            "$(xcode-select -p)/Toolchains/XcodeDefault.xctoolchain/usr/lib/clang" \
            "/Library/Developer/CommandLineTools/usr/lib/clang"; do
            [ -d "$base" ] || continue
            hit="$(find "$base" -name libclang_rt.osx.a 2>/dev/null | head -1 || true)"
            if [ -n "$hit" ]; then libdir="$(dirname "$hit")"; break; fi
          done
          if [ -z "$libdir" ]; then
            echo "could not find libclang_rt.osx.a" >&2
            exit 1
          fi
          echo "clang runtime dir: $libdir"
          echo "RUSTFLAGS=${RUSTFLAGS:-} -L $libdir" >> "$GITHUB_ENV"

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --locked

      - name: Test
        run: cargo test --release --locked

      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          name: kropp-${{ matrix.os }}
          path: target/release/${{ matrix.bin }}
          if-no-files-found: error
