name: CI

# Build + test on every pushed commit (to any branch; tag pushes are handled by
# the release workflow) and on pull requests, uploading the built binary as a
# workflow artifact for each platform. Also runnable on demand from the Actions
# tab via workflow_dispatch.
on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

# Cancel an in-progress run when the same ref is pushed again.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            bin: kropp.exe
          - os: ubuntu-latest
            bin: kropp
          - os: macos-latest
            bin: kropp
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --locked

      - name: Test
        run: cargo test --release --locked

      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          name: kropp-${{ matrix.os }}
          path: target/release/${{ matrix.bin }}
          if-no-files-found: error
